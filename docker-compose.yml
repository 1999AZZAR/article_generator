# docker-compose.yml
# Local origin for the existing Cloudflare Tunnel (quill.glassgallery.my.id).
#
# Two network setups are supported:
#   1. cloudflared runs on the HOST  -> publish 8787 to host, tunnel origin = http://localhost:8787
#   2. cloudflared runs in a CONTAINER -> join the `tunnel` network, origin = http://quill-dev:8787
#
# Usage:
#   docker compose up -d
#   docker compose logs -f quill-dev

name: quill

services:
  postgres:
    image: postgres:16-alpine
    container_name: quill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quill
      POSTGRES_USER: quill
      POSTGRES_PASSWORD: quilldev
    volumes:
      - quill-postgres:/var/lib/postgresql/data
    networks:
      - tunnel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quill -d quill"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: quill-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - quill-redis:/data
    networks:
      - tunnel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  quill-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: quill-dev:latest
    container_name: quill-dev
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgresql://quill:quilldev@postgres:5432/quill
      REDIS_URL: redis://redis:6379
    ports:
      # Host-side tunnel origin (when cloudflared runs on the host).
      - "127.0.0.1:8787:8787"
    volumes:
      - .:/app
      - /app/node_modules
      - quill-data:/app/.wrangler
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tunnel

networks:
  tunnel:
    name: tunnel
    # If your existing cloudflared runs in its own container/compose and is
    # already attached to a `tunnel` network, change this to `external: true`
    # and ensure that network exists. Otherwise leave it as `external: false`
    # and attach cloudflared with:
    #   docker network connect tunnel <cloudflared-container>
    external: false

volumes:
  quill-data:
  quill-postgres:
  quill-redis:
